{% extends 'base.html' %}

{% block title %}Нет прав — Issue Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="alert alert-danger shadow-sm">
            <h4 class="alert-heading">Нет доступа</h4>
            <p class="mb-0">
                {% if exception %}{{ exception }}{% else %}У вас недостаточно прав для этого действия.{% endif %}
            </p>
        </div>
        <a href="{% url 'task_list' %}" class="btn btn-primary">На главную</a>
    </div>
</div>
{% endblock %}
